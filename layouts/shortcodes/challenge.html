<section class="hx:mt-8 hx:overflow-hidden hx:rounded-2xl hx:border hx:border-amber-200 hx:bg-amber-50/60 hx:p-5 hx:shadow-sm hx:dark:border-amber-400/30 hx:dark:bg-amber-500/10">
  <div class="hx:flex hx:flex-wrap hx:items-start hx:gap-3">
    <span class="hx:inline-flex hx:items-center hx:rounded-full hx:bg-amber-500/15 hx:px-3 hx:py-1 hx:text-xs hx:font-semibold hx:uppercase hx:tracking-[0.16em] hx:text-amber-900 hx:dark:bg-amber-300/15 hx:dark:text-amber-200">Challenge</span>
    <div class="hx:min-w-0 hx:flex-1">
      {{ with .Get "title" }}<h3 class="hx:my-0 hx:text-xl hx:font-semibold hx:text-gray-900 hx:dark:text-gray-100">{{ . }}</h3>{{ end }}
      <p class="hx:mt-2 hx:text-sm hx:text-amber-900/80 hx:dark:text-amber-100/80">Use short, answerable prompts that work well in workshops and still read clearly in an all-in-one lesson view.</p>
    </div>
  </div>
  <div class="hx:mt-5 hx:space-y-4">
    {{ .Inner | .Page.RenderString }}
  </div>
</section>
