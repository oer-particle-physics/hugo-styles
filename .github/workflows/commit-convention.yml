name: Check Conventional Commits

on:
  pull_request:

permissions:
  contents: read

jobs:
  commit-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: python -m pip install --upgrade pip commitizen==4.10.0

      - name: Validate commit messages
        shell: bash
        run: |
          cz check \
            --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --allowed-prefixes "Merge" "Revert" "fixup!" "squash!"
