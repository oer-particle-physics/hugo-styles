name: Deploy docs site

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.1"
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install maintainer tools
        run: npm ci

      - name: Verify vendored FlexSearch bundle
        run: npm run check:flexsearch

      - name: Download modules
        run: hugo mod tidy

      - name: Run migration tool tests
        working-directory: cmd/hugo-styles-migrate
        run: go test ./...

      - name: Validate example lesson content
        working-directory: cmd/hugo-styles-migrate
        run: go run . check ../..

      - name: Fetch deploy refs
        run: git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' --tags

      - name: Build
        run: python3 scripts/build-versioned-site.py --base-url "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
