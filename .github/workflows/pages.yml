name: Deploy docs site

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  pages:
    uses: ./.github/workflows/reusable-pages.yml
    with:
      site-root: .
      go-version-file: go.mod
      setup-node: true
      node-version: "22"
      prepare-command: |
        npm ci
        npm run check:flexsearch
        hugo mod tidy
        (cd cmd/hugo-styles-migrate && go test ./...)
      validation-command: |
        (cd cmd/hugo-styles-migrate && go run . check ../..)
